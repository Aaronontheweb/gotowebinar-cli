name: pr_validation

on:
  push:
    branches:
      - master
      - dev
      - main
  pull_request:
    branches:
      - master
      - dev
      - main

jobs:
  test:
    name: Test-${{matrix.os}}
    runs-on: ${{matrix.os}}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: "Install .NET SDK"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: "Restore .NET tools"
        run: dotnet tool restore

      - name: "dotnet restore"
        run: dotnet restore GoToWebinarCLI.sln

      - name: "dotnet build"
        run: dotnet build GoToWebinarCLI.sln -c Release --no-restore

      - name: "dotnet test"
        shell: bash
        run: dotnet test GoToWebinarCLI.sln -c Release --no-build