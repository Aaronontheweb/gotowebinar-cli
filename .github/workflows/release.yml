name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
      is_prerelease: ${{ steps.get_version.outputs.is_prerelease }}
    steps:
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Check if this is a prerelease (contains beta, alpha, rc, etc.)
          if [[ "$VERSION" =~ (beta|alpha|rc|preview) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
        
      - name: Checkout code for release notes
        uses: actions/checkout@v4
        
      - name: Extract release notes
        id: release_notes
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $releaseNotes = & ./scripts/getReleaseNotes.ps1 -Version $version
          
          # Write to file to handle multiline content
          $releaseNotes | Out-File -FilePath release_notes.txt -Encoding UTF8
          
          # Set output for GitHub Actions
          echo "release_notes_file=release_notes.txt" >> $env:GITHUB_OUTPUT
        
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release v${{ steps.get_version.outputs.version }}
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ steps.get_version.outputs.is_prerelease }}
          
  build-and-upload:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            artifact_name: gotowebinar-linux-x64
            binary_name: gotowebinar
          - os: windows-latest
            runtime: win-x64
            artifact_name: gotowebinar-win-x64.exe
            binary_name: gotowebinar.exe
          - os: macos-latest
            runtime: osx-x64
            artifact_name: gotowebinar-osx-x64
            binary_name: gotowebinar
          - os: macos-latest
            runtime: osx-arm64
            artifact_name: gotowebinar-osx-arm64
            binary_name: gotowebinar
            
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Update version in project
      shell: pwsh
      run: |
        $version = "${{ needs.create-release.outputs.version }}"
        $csprojPath = "src/GoToWebinarCLI/GoToWebinarCLI.csproj"
        $content = Get-Content $csprojPath -Raw
        $content = $content -replace '<Version>.*</Version>', "<Version>$version</Version>"
        $content = $content -replace '<AssemblyVersion>.*</AssemblyVersion>', "<AssemblyVersion>$version.0</AssemblyVersion>"
        $content = $content -replace '<FileVersion>.*</FileVersion>', "<FileVersion>$version.0</FileVersion>"
        Set-Content -Path $csprojPath -Value $content
        
    - name: Build and Publish AOT
      run: |
        dotnet publish src/GoToWebinarCLI/GoToWebinarCLI.csproj \
          -c Release \
          -r ${{ matrix.runtime }} \
          --self-contained \
          -p:PublishAot=true \
          -p:Version=${{ needs.create-release.outputs.version }} \
          -o ./publish
          
    - name: Compress binary (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        cd publish
        tar -czf ../${{ matrix.artifact_name }}.tar.gz ${{ matrix.binary_name }}
        cd ..
        
    - name: Compress binary (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/${{ matrix.binary_name }} -DestinationPath ./${{ matrix.artifact_name }}.zip
        
    - name: Upload Release Asset (Linux/macOS)
      if: matrix.os != 'windows-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./${{ matrix.artifact_name }}.tar.gz
        asset_name: ${{ matrix.artifact_name }}.tar.gz
        asset_content_type: application/gzip
        
    - name: Upload Release Asset (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./${{ matrix.artifact_name }}.zip
        asset_name: ${{ matrix.artifact_name }}.zip
        asset_content_type: application/zip
        
  publish-nuget:
    needs: [create-release, build-and-upload]
    runs-on: ubuntu-latest
    # Only publish to NuGet for non-prerelease versions
    if: needs.create-release.outputs.is_prerelease == 'false'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
          
      - name: Update version and make packable
        shell: pwsh
        run: |
          $version = "${{ needs.create-release.outputs.version }}"
          $csprojPath = "src/GoToWebinarCLI/GoToWebinarCLI.csproj"
          $content = Get-Content $csprojPath -Raw
          $content = $content -replace '<Version>.*</Version>', "<Version>$version</Version>"
          $content = $content -replace '<IsPackable>false</IsPackable>', '<IsPackable>true</IsPackable>'
          $content = $content -replace '<PublishAot>true</PublishAot>', '<PublishAot>false</PublishAot>'
          
          # Add tool packaging properties
          $toolProperties = @"
            <PackAsTool>true</PackAsTool>
            <ToolCommandName>gotowebinar</ToolCommandName>
            <PackageId>GoToWebinarCLI</PackageId>
            <PackageProjectUrl>https://github.com/stannardlabs/gotowebinar-cli</PackageProjectUrl>
            <RepositoryUrl>https://github.com/stannardlabs/gotowebinar-cli</RepositoryUrl>
            <PackageLicenseExpression>Apache-2.0</PackageLicenseExpression>
            <PackageTags>gotowebinar;cli;api;webinar</PackageTags>
          </PropertyGroup>
          "@
          
          $content = $content -replace '</PropertyGroup>', "$toolProperties"
          Set-Content -Path $csprojPath -Value $content
          
      - name: Pack NuGet package
        run: dotnet pack src/GoToWebinarCLI/GoToWebinarCLI.csproj -c Release -o ./nupkg
        
      - name: Push to NuGet
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          
  update-version-manifest:
    needs: [create-release, build-and-upload]
    runs-on: ubuntu-latest
    # Only update manifest for non-prerelease versions
    if: needs.create-release.outputs.is_prerelease == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Update version manifest
        run: |
          cat > version.json <<EOF
          {
            "version": "${{ needs.create-release.outputs.version }}",
            "releaseDate": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "downloads": {
              "linux-x64": "https://github.com/${{ github.repository }}/releases/download/v${{ needs.create-release.outputs.version }}/gotowebinar-linux-x64.tar.gz",
              "win-x64": "https://github.com/${{ github.repository }}/releases/download/v${{ needs.create-release.outputs.version }}/gotowebinar-win-x64.exe.zip",
              "osx-x64": "https://github.com/${{ github.repository }}/releases/download/v${{ needs.create-release.outputs.version }}/gotowebinar-osx-x64.tar.gz",
              "osx-arm64": "https://github.com/${{ github.repository }}/releases/download/v${{ needs.create-release.outputs.version }}/gotowebinar-osx-arm64.tar.gz"
            },
            "releaseNotes": "https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}"
          }
          EOF
          
      - name: Commit version manifest
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add version.json
          git diff --staged --quiet || git commit -m "Update version manifest to ${{ needs.create-release.outputs.version }}"
          git push