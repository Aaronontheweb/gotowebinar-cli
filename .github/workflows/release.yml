name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
      is_prerelease: ${{ steps.get_version.outputs.is_prerelease }}
    steps:
      - name: Get version from tag
        id: get_version
        run: |
          # Remove 'v' prefix if present, otherwise use tag as-is
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # Check if this is a prerelease (contains beta, alpha, rc, etc.)
          if [[ "$VERSION" =~ (beta|alpha|rc|preview) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
        
      - name: Checkout code for release notes
        uses: actions/checkout@v7
        
      - name: Extract release notes
        id: release_notes
        shell: pwsh
        run: |
          $content = Get-Content RELEASE_NOTES.md -Raw
          # Match from the first #### heading to just before the next one
          if ($content -match '(?s)(####.+?)(?=\n####|\z)') {
            $Matches[1].Trim() | Set-Content release_notes.txt
          } else {
            $content | Set-Content release_notes.txt
          }
        
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release v${{ steps.get_version.outputs.version }}
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ steps.get_version.outputs.is_prerelease }}
          
  build-and-upload:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            artifact_name: gotowebinar-linux-x64
            binary_name: gotowebinar
          - os: windows-latest
            runtime: win-x64
            artifact_name: gotowebinar-win-x64.exe
            binary_name: gotowebinar.exe
          - os: macos-latest
            runtime: osx-x64
            artifact_name: gotowebinar-osx-x64
            binary_name: gotowebinar
          - os: macos-latest
            runtime: osx-arm64
            artifact_name: gotowebinar-osx-arm64
            binary_name: gotowebinar
            
    steps:
    - uses: actions/checkout@v7
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Update version in project
      shell: pwsh
      run: |
        $version = "${{ needs.create-release.outputs.version }}"
        $csprojPath = "src/GoToWebinarCLI/GoToWebinarCLI.csproj"
        $content = Get-Content $csprojPath -Raw
        $content = $content -replace '<Version>.*</Version>', "<Version>$version</Version>"
        $content = $content -replace '<AssemblyVersion>.*</AssemblyVersion>', "<AssemblyVersion>$version.0</AssemblyVersion>"
        $content = $content -replace '<FileVersion>.*</FileVersion>', "<FileVersion>$version.0</FileVersion>"
        Set-Content -Path $csprojPath -Value $content
        
    - name: Build and Publish AOT
      run: dotnet publish src/GoToWebinarCLI/GoToWebinarCLI.csproj -c Release -r ${{ matrix.runtime }} --self-contained -p:PublishAot=true -p:Version=${{ needs.create-release.outputs.version }} -o ./publish
          
    - name: Compress binary (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        cd publish
        tar -czf ../${{ matrix.artifact_name }}.tar.gz ${{ matrix.binary_name }}
        cd ..
        
    - name: Compress binary (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/${{ matrix.binary_name }} -DestinationPath ./${{ matrix.artifact_name }}.zip
        
    - name: Upload Release Asset (Linux/macOS)
      if: matrix.os != 'windows-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./${{ matrix.artifact_name }}.tar.gz
        asset_name: ${{ matrix.artifact_name }}.tar.gz
        asset_content_type: application/gzip
        
    - name: Upload Release Asset (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./${{ matrix.artifact_name }}.zip
        asset_name: ${{ matrix.artifact_name }}.zip
        asset_content_type: application/zip
